<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Scoreboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #000;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .scoreboard {
    width: 1920px;
    height: 1080px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 80px;
    gap: 0;
  }

  /* Top accent bar */
  .top-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    background: linear-gradient(90deg, #e8192c 0%, #f5c800 100%);
  }

  /* Quarter + Clock row */
  .meta-row {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 48px;
    margin-bottom: 36px;
  }

  .quarter-display {
    font-weight: 800;
    font-size: 100px;
    color: #f5c800;
    letter-spacing: 0.04em;
    line-height: 1;
  }

  .clock-display {
    font-weight: 900;
    font-size: 140px;
    color: #f5c800;
    letter-spacing: 0.02em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    min-width: 320px;
    text-align: left;
  }

  /* Divider between teams */
  .team-divider {
    height: 3px;
    background: rgba(255,255,255,0.1);
    margin: 18px 0;
  }

  /* Each team row: logo | scores pushed right */
  .team-row {
    display: flex;
    align-items: center;
    gap: 60px;
  }

  .team-logo {
    width: 220px;
    height: 220px;
    object-fit: contain;
    flex-shrink: 0;
    filter: drop-shadow(0 4px 24px rgba(0,0,0,0.7));
  }

  .team-logo-placeholder {
    width: 220px;
    height: 220px;
    flex-shrink: 0;
  }

  /* Score numbers fill remaining space */
  .score-group {
    display: flex;
    align-items: center;
    flex: 1;
    justify-content: flex-end;
    gap: 0;
  }

  .score-goals {
    font-weight: 900;
    font-size: 260px;
    line-height: 0.9;
    color: #fff;
    font-variant-numeric: tabular-nums;
    min-width: 300px;
    text-align: right;
  }

  .score-sep {
    font-size: 180px;
    color: rgba(255,255,255,0.2);
    line-height: 0.9;
    padding: 0 20px;
    font-weight: 300;
  }

  .score-behinds {
    font-weight: 900;
    font-size: 260px;
    line-height: 0.9;
    color: #fff;
    font-variant-numeric: tabular-nums;
    min-width: 300px;
    text-align: center;
  }

  .score-total-wrap {
    min-width: 340px;
    text-align: right;
    border-left: 3px solid rgba(255,255,255,0.12);
    margin-left: 30px;
    padding-left: 40px;
  }

  .score-total {
    font-weight: 900;
    font-size: 260px;
    line-height: 0.9;
    color: #fff;
    font-variant-numeric: tabular-nums;
  }

  /* Score bump animation */
  @keyframes bump {
    0%   { transform: scale(1);    color: #fff; }
    40%  { transform: scale(1.1);  color: #f5c800; }
    100% { transform: scale(1);    color: #fff; }
  }
  .score-bump { animation: bump 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }

  /* Watermark */
  .watermark {
    position: absolute;
    bottom: 28px;
    right: 48px;
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0.45;
  }
  .watermark-live {
    background: #e8192c;
    color: #fff;
    font-weight: 800;
    font-size: 16px;
    padding: 3px 7px;
    border-radius: 2px;
    letter-spacing: 0.05em;
  }
  .watermark-text {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="scoreboard">
  <div class="top-bar"></div>

  <!-- Quarter + Clock -->
  <div class="meta-row">
    <div class="quarter-display" id="quarter-display">Q1</div>
    <div class="clock-display" id="clock-display">0:00</div>
  </div>

  <!-- Teams -->
  <div id="home-team-row" class="team-row">
    <div id="home-logo-wrap"><div class="team-logo-placeholder"></div></div>
    <div class="score-group">
      <div class="score-goals"   id="home-goals">0</div>
      <div class="score-sep">.</div>
      <div class="score-behinds" id="home-behinds">0</div>
      <div class="score-total-wrap">
        <div class="score-total" id="home-total">0</div>
      </div>
    </div>
  </div>

  <div class="team-divider"></div>

  <div id="away-team-row" class="team-row">
    <div id="away-logo-wrap"><div class="team-logo-placeholder"></div></div>
    <div class="score-group">
      <div class="score-goals"   id="away-goals">0</div>
      <div class="score-sep">.</div>
      <div class="score-behinds" id="away-behinds">0</div>
      <div class="score-total-wrap">
        <div class="score-total" id="away-total">0</div>
      </div>
    </div>
  </div>

  <div class="watermark">
    <span class="watermark-live">LIVE</span>
    <span class="watermark-text">SourceData</span>
  </div>
</div>

<script>
(async function() {
  const slug = window.location.pathname.split('/')[1];
  let clockInterval = null;
  let localClock = 0;
  let prev = {};

  function formatClock(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  function setLogo(wrapId, url) {
    const wrap = document.getElementById(wrapId);
    if (url) {
      wrap.innerHTML = '<img class="team-logo" src="' + url + '" alt="">';
    } else {
      wrap.innerHTML = '<div class="team-logo-placeholder"></div>';
    }
  }

  function bump(el) {
    el.classList.remove('score-bump');
    void el.offsetWidth;
    el.classList.add('score-bump');
  }

  function update(data) {
    const h = data.homeTeam || {};
    const a = data.awayTeam || {};

    // Quarter
    var qLabels = ['Q1','Q2','Q3','Q4'];
    var q = Math.min((data.quarter || 1) - 1, 3);
    document.getElementById('quarter-display').textContent = qLabels[q];

    // Logos
    setLogo('home-logo-wrap', h.logo || '');
    setLogo('away-logo-wrap', a.logo || '');

    // Scores with bump
    var fields = [
      ['home-goals',   h.goals   || 0],
      ['home-behinds', h.behinds || 0],
      ['home-total',   (h.goals||0)*6 + (h.behinds||0)],
      ['away-goals',   a.goals   || 0],
      ['away-behinds', a.behinds || 0],
      ['away-total',   (a.goals||0)*6 + (a.behinds||0)],
    ];
    fields.forEach(function(f) {
      var el = document.getElementById(f[0]);
      if (prev[f[0]] !== undefined && prev[f[0]] !== f[1]) bump(el);
      el.textContent = f[1];
      prev[f[0]] = f[1];
    });

    // Clock
    localClock = data.clock || 0;
    if (clockInterval) clearInterval(clockInterval);
    if (data.clockRunning) {
      clockInterval = setInterval(function() {
        localClock++;
        document.getElementById('clock-display').textContent = formatClock(localClock);
      }, 1000);
    }
    document.getElementById('clock-display').textContent = formatClock(localClock);
  }

  // Init Firebase
  const cfgRes = await fetch('/api/firebase-config');
  const firebaseConfig = await cfgRes.json();
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js');
  const { getFirestore, doc, onSnapshot } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js');
  const db = getFirestore(initializeApp(firebaseConfig));
  onSnapshot(doc(db, 'games', slug), function(snap) {
    if (snap.exists()) update(snap.data());
  });
})();
</script>
</body>
</html>
